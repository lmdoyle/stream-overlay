<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background-color: rgba(0,0,0,0) !important; margin: 0; padding: 0; overflow: hidden; }
  .box {
    background: rgba(0, 0, 0, 0.55);
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
  <div class="box"></div>
</body>
</html>
