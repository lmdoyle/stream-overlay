<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Overlay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; width: 100%; height: 100%; }

  .overlay {
    display: inline-flex;
    flex-direction: row;
    align-items: center;
    gap: 0;
    padding: 10px 16px;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.12);
  }

  .platform-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px;
  }

  .platform-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .platform-icon svg { width: 16px; height: 16px; }

  .yt-bg  { background: #FF0000; }
  .tw-bg  { background: #9146FF; }
  .tt-bg  { background: #000; border: 1px solid rgba(255,255,255,0.2); }

  .bar-wrap {
    width: 120px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .bar-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .platform-name {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .count {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }

  .goal-label {
    font-size: 11px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.4);
  }

  .bar-track {
    height: 5px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 1.2s ease;
  }

  .yt-fill { background: #FF0000; }
  .tw-fill { background: #9146FF; }
  .tt-fill { background: linear-gradient(90deg, #69C9D0, #EE1D52); }

  .divider {
    width: 1px;
    height: 36px;
    background: rgba(255, 255, 255, 0.08);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="overlay">

  <!-- YouTube -->
  <div class="platform-row">
    <div class="platform-icon yt-bg">
      <svg viewBox="0 0 24 24" fill="white"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1C4.5 20.4 12 20.4 12 20.4s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
    </div>
    <div class="bar-wrap">
      <div class="bar-label">
        <span class="platform-name">YouTube</span>
        <span class="count" id="yt-count">— <span class="goal-label">/ —</span></span>
      </div>
      <div class="bar-track"><div class="bar-fill yt-fill" id="yt-bar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Twitch -->
  <div class="platform-row">
    <div class="platform-icon tw-bg">
      <svg viewBox="0 0 24 24" fill="white"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
    </div>
    <div class="bar-wrap">
      <div class="bar-label">
        <span class="platform-name">Twitch</span>
        <span class="count" id="tw-count">— <span class="goal-label">/ —</span></span>
      </div>
      <div class="bar-track"><div class="bar-fill tw-fill" id="tw-bar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- TikTok -->
  <div class="platform-row">
    <div class="platform-icon tt-bg">
      <svg viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.3 6.3 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.22 8.22 0 0 0 4.81 1.55V6.79a4.85 4.85 0 0 1-1.04-.1z"/></svg>
    </div>
    <div class="bar-wrap">
      <div class="bar-label">
        <span class="platform-name">TikTok</span>
        <span class="count" id="tt-count">— <span class="goal-label">/ —</span></span>
      </div>
      <div class="bar-track"><div class="bar-fill tt-fill" id="tt-bar" style="width:0%"></div></div>
    </div>
  </div>

</div>

<script>
  const p = new URLSearchParams(window.location.search);

  function setRow(countEl, barEl, val, goal) {
    if (val === null || goal === null) return;
    countEl.innerHTML = `${val} <span class="goal-label">/ ${goal}</span>`;
    barEl.style.width = Math.min(100, Math.round(val / goal * 100)) + '%';
  }

  const yt  = p.get('yt'),  ytGoal  = p.get('ytGoal');
  const tw  = p.get('tw'),  twGoal  = p.get('twGoal');
  const tt  = p.get('tt'),  ttGoal  = p.get('ttGoal');

  setTimeout(() => {
    setRow(document.getElementById('yt-count'), document.getElementById('yt-bar'), yt, ytGoal);
    setRow(document.getElementById('tw-count'), document.getElementById('tw-bar'), tw, twGoal);
    setRow(document.getElementById('tt-count'), document.getElementById('tt-bar'), tt, ttGoal);
  }, 100);
</script>

</body>
</html>
