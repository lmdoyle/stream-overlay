<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Sub Goal Overlay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background-color: rgba(0,0,0,0) !important; margin: 0; padding: 0; overflow: hidden; }

  .overlay {
    display: inline-flex;
    flex-direction: row;
    align-items: stretch;
    gap: 0;
    background: rgba(10, 10, 30, 0.82);
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 8px 32px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
    overflow: hidden;
  }

  .platform-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-left: 3px solid transparent;
  }

  .yt-row  { border-left-color: #FF0000; }
  .tw-row  { border-left-color: #9146FF; }
  .tt-row  { border-left-color: #69C9D0; }

  .platform-icon {
    width: 30px;
    height: 30px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .platform-icon svg { width: 17px; height: 17px; }

  .yt-bg  { background: #FF0000; }
  .tw-bg  { background: #9146FF; }
  .tt-bg  { background: #111; border: 1px solid rgba(255,255,255,0.2); }

  .bar-wrap {
    width: 130px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .bar-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .platform-name {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .count {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }

  .goal-label {
    font-size: 12px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.45);
  }

  .bar-track {
    height: 7px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 1.2s ease;
  }

  .yt-fill { background: #FF0000; }
  .tw-fill { background: #9146FF; }
  .tt-fill { background: linear-gradient(90deg, #69C9D0, #EE1D52); }

  .divider {
    width: 1px;
    align-self: stretch;
    background: rgba(255, 255, 255, 0.08);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="overlay">

  <!-- YouTube -->
  <div class="platform-row yt-row">
    <div class="platform-icon yt-bg">
      <svg viewBox="0 0 24 24" fill="white"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1C4.5 20.4 12 20.4 12 20.4s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
    </div>
    <div class="bar-wrap">
      <div class="bar-label">
        <span class="platform-name">YouTube</span>
        <span class="count" id="yt-count">— <span class="goal-label">/ —</span></span>
      </div>
      <div class="bar-track"><div class="bar-fill yt-fill" id="yt-bar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Twitch -->
  <div class="platform-row tw-row">
    <div class="platform-icon tw-bg">
      <svg viewBox="0 0 24 24" fill="white"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
    </div>
    <div class="bar-wrap">
      <div class="bar-label">
        <span class="platform-name">Twitch</span>
        <span class="count" id="tw-count">— <span class="goal-label">/ —</span></span>
      </div>
      <div class="bar-track"><div class="bar-fill tw-fill" id="tw-bar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- TikTok -->
  <div class="platform-row tt-row">
    <div class="platform-icon tt-bg">
      <svg viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.3 6.3 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.22 8.22 0 0 0 4.81 1.55V6.79a4.85 4.85 0 0 1-1.04-.1z"/></svg>
    </div>
    <div class="bar-wrap">
      <div class="bar-label">
        <span class="platform-name">TikTok</span>
        <span class="count" id="tt-count">— <span class="goal-label">/ —</span></span>
      </div>
      <div class="bar-track"><div class="bar-fill tt-fill" id="tt-bar" style="width:0%"></div></div>
    </div>
  </div>

</div>

<script>
  const p = new URLSearchParams(window.location.search);
  const ytGoal = p.get('ytGoal');
  const twGoal = p.get('twGoal');
  const tt     = p.get('tt'), ttGoal = p.get('ttGoal');

  const YT_API_KEY      = 'AIzaSyBO_340lPaIBW2J5EBubFsTuUPmzbYFLhg';
  const YT_CHANNEL_ID   = 'UCqerFn8i1CGwejETEnnGEfw';
  const TW_CLIENT_ID    = 'i0e6usnv0xnffabmhp7a1qmh5nh6iy';
  const TW_USERNAME     = 'gamer_guy_tv';
  const TW_REDIRECT_URI = 'https://lmdoyle.github.io/stream-overlay/';
  const TT_USERNAME = 'gamerguytv';

  function setRow(countEl, barEl, val, goal) {
    if (val === null || goal === null) return;
    countEl.innerHTML = `${val} <span class="goal-label">/ ${goal}</span>`;
    barEl.style.width = Math.min(100, Math.round(val / goal * 100)) + '%';
  }

  async function fetchYouTubeSubs() {
    try {
      const res  = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${YT_CHANNEL_ID}&key=${YT_API_KEY}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const subs = data.items?.[0]?.statistics?.subscriberCount;
      if (subs !== undefined) setRow(document.getElementById('yt-count'), document.getElementById('yt-bar'), parseInt(subs), ytGoal);
    } catch (e) {
      console.error('YouTube fetch failed:', e.message);
      document.getElementById('yt-count').innerHTML = `ERR <span class="goal-label">/ ${ytGoal}</span>`;
    }
  }

  function getTwitchToken() {
    const hash = new URLSearchParams(window.location.hash.slice(1));
    if (hash.get('access_token')) {
      const token = hash.get('access_token');
      localStorage.setItem('twitch_token', token);
      window.history.replaceState(null, '', window.location.pathname + window.location.search);
      return token;
    }
    return localStorage.getItem('twitch_token');
  }

  async function fetchTwitchFollowers(token) {
    try {
      const userRes  = await fetch(`https://api.twitch.tv/helix/users?login=${TW_USERNAME}`, {
        headers: { 'Client-ID': TW_CLIENT_ID, 'Authorization': `Bearer ${token}` }
      });
      const userData = await userRes.json();
      if (userData.error || !userData.data?.[0]) throw new Error(userData.message || 'User not found');
      const broadcasterId = userData.data[0].id;

      const followRes  = await fetch(`https://api.twitch.tv/helix/channels/followers?broadcaster_id=${broadcasterId}`, {
        headers: { 'Client-ID': TW_CLIENT_ID, 'Authorization': `Bearer ${token}` }
      });
      const followData = await followRes.json();
      if (followData.error) throw new Error(followData.message);
      setRow(document.getElementById('tw-count'), document.getElementById('tw-bar'), followData.total, twGoal);
    } catch (e) {
      console.error('Twitch fetch failed:', e.message);
      if (e.message?.includes('401') || e.message?.includes('Invalid OAuth')) {
        localStorage.removeItem('twitch_token');
        initTwitch();
      } else {
        document.getElementById('tw-count').innerHTML = `ERR <span class="goal-label">/ ${twGoal ?? '—'}</span>`;
      }
    }
  }

  function initTwitch() {
    const token = getTwitchToken();
    if (token) {
      fetchTwitchFollowers(token);
      setInterval(() => fetchTwitchFollowers(token), 60 * 1000);
    } else {
      const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${TW_CLIENT_ID}&redirect_uri=${encodeURIComponent(TW_REDIRECT_URI)}&response_type=token&scope=moderator%3Aread%3Afollowers`;
      document.getElementById('tw-count').innerHTML = `<a href="${authUrl}" style="color:#9146FF;font-size:11px;text-decoration:none;">Connect Twitch</a>`;
    }
  }

  async function fetchTikTokFollowers() {
    try {
      const res  = await fetch(`https://www.tikwm.com/api/user/info?unique_id=${TT_USERNAME}`);
      const data = await res.json();
      const followers = data?.data?.stats?.followerCount;
      if (followers !== undefined) {
        setRow(document.getElementById('tt-count'), document.getElementById('tt-bar'), followers, ttGoal);
      } else throw new Error('Unexpected response shape');
    } catch (e) {
      console.error('TikTok fetch failed:', e.message);
      document.getElementById('tt-count').innerHTML = `ERR <span class="goal-label">/ ${ttGoal ?? '—'}</span>`;
    }
  }

  fetchYouTubeSubs();
  setInterval(fetchYouTubeSubs, 60 * 1000);
  initTwitch();
  fetchTikTokFollowers();
  setInterval(fetchTikTokFollowers, 60 * 1000);
</script>

</body>
</html>
